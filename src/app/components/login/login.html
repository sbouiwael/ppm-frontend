<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <img src="/logo-biat.webp" alt="BIAT" class="login-logo" />
      <h1 class="login-title">PPM</h1>
      <p class="login-subtitle">Project Portfolio Management</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <svg
            class="input-icon"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            width="18"
            height="18"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
            />
          </svg>
          <input
            type="email"
            formControlName="email"
            placeholder="votre.email@entreprise.com"
            autocomplete="email"
          />
        </div>
        @if (form.get('email')?.touched && form.get('email')?.invalid) {
          <div class="form-error">Email valide requis</div>
        }
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <svg
            class="input-icon"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            width="18"
            height="18"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
          <input
            type="password"
            formControlName="password"
            placeholder="Mot de passe"
            autocomplete="current-password"
          />
        </div>
        @if (form.get('password')?.touched && form.get('password')?.invalid) {
          <div class="form-error">Mot de passe requis</div>
        }
      </div>

      @if (errorMsg) {
        <div class="login-error">{{ errorMsg }}</div>
      }

      <button type="submit" class="login-btn" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span> Connexion...
        } @else {
          Se connecter
        }
      </button>
    </form>

    <p class="login-footer">BIAT Innovation & Technology &copy; 2026</p>
  </div>
</div>
